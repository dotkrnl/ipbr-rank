name: refresh

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Restore upstream response cache
        id: upstream-cache
        uses: actions/cache/restore@v4
        with:
          path: cache
          key: upstream-cache-${{ github.run_id }}
          restore-keys: |
            upstream-cache-

      - name: Build CLI
        run: cargo build --release -p ipbr-rank-cli

      # Best-effort: pull the currently-published scoreboard so the next
      # render can compute per-role deltas vs. the live site. continue-on-
      # error keeps a network blip from failing the whole refresh; the
      # pipeline simply omits delta chips when no prev file is supplied.
      - name: Fetch prior scoreboard for deltas
        id: prev-fetch
        continue-on-error: true
        run: |
          mkdir -p cache
          if curl -fsS --max-time 10 \
              https://ipbr.pages.dev/scoreboard.toml \
              -o cache/prev_scoreboard.toml; then
            echo "fetched prior scoreboard ($(wc -c < cache/prev_scoreboard.toml) bytes)"
            echo "prev_arg=--prev cache/prev_scoreboard.toml" >> "$GITHUB_OUTPUT"
          else
            # Drop any stale file restored from the upstream-cache so we
            # never accidentally use a many-runs-old prior.
            rm -f cache/prev_scoreboard.toml
            echo "note: prev fetch failed; deltas will be omitted this run"
          fi

      - name: Run pipeline
        env:
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: ./target/release/ipbr-rank --cache cache --out out all ${{ steps.prev-fetch.outputs.prev_arg }}

      - name: Save upstream response cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: cache
          key: upstream-cache-${{ github.run_id }}

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx --yes wrangler@latest pages deploy out/site \
            --project-name=ipbr \
            --branch=main \
            --commit-dirty=true
