# Coefficients for ipbr-rank scoring.
# This file is the authoritative source of truth; the CLI embeds it verbatim.

# AI Stupid Level perspective composites — role-shaped views over AISL's
# capability-axis surface. AISL ships three capability suites (hourly,
# deep, tooling) which jointly cover 17 axes; canary health is registered
# separately below and consumed only as a penalty signal.
#
# Each role pulls a tailored slice:
#   * A_I (Idea): broad correctness + creative-flexibility axes
#   * A_P (Planning): planCoherence + tooling suite axes (taskCompletion,
#     contextAwareness, toolSelection) heavily weighted
#   * A_B (Building): codeQuality, complexity, edgeCases, hallucination-
#     resistance, plus the basic building axes
#   * A_R (Reviewing): correctness + hallucination-resistance + spec
#     adherence — the qualities that make a model a good code reviewer
[ai_stupid_perspective_weights.A_I]
# AI_refusal (safety axis) and AI_code removed — neither measures idea quality.
# Freed weight redistributed across correctness, spec, stability, recovery,
# complexity, edge_cases, and plan_coherence.
AI_correctness = 0.18
AI_spec = 0.18
AI_efficiency = 0.08
AI_stability = 0.16
AI_recovery = 0.12
AI_complexity = 0.10
AI_edge_cases = 0.08
AI_plan_coherence = 0.10

[ai_stupid_perspective_weights.A_P]
AI_correctness = 0.14
AI_spec = 0.14
AI_efficiency = 0.04
AI_stability = 0.08
AI_recovery = 0.06
AI_plan_coherence = 0.18
AI_memory_retention = 0.06
AI_context_awareness = 0.10
AI_task_completion = 0.10
AI_tool_selection = 0.06
AI_parameter_accuracy = 0.04

[ai_stupid_perspective_weights.A_B]
AI_correctness = 0.14
AI_spec = 0.12
AI_code = 0.22
AI_efficiency = 0.08
AI_stability = 0.08
AI_recovery = 0.06
AI_complexity = 0.10
AI_edge_cases = 0.08
AI_hallucination_resistance = 0.08
AI_memory_retention = 0.04

[ai_stupid_perspective_weights.A_R]
# Tuned to lean into review-specific axes while keeping the most thinly-
# covered ones (hallucination_resistance, error_handling — many AISL rows
# don't carry these) under the 0.30 missing-weight ceiling so models avoid
# the sparse-coverage side of the 0.60-0.80 shrink transition.
#
# hallucinationResistance up to 0.17 (the biggest review-specific signal —
# does the model invent issues that aren't there?), edgeCases up to 0.13
# (review = catching what implementers missed), recovery up to 0.10 (a
# good reviewer recovers from a wrong initial read). correctness/spec
# down because they saturate across frontier models and stop
# differentiating; stability down for the same reason.
AI_correctness = 0.18
AI_spec = 0.14
AI_code = 0.10
AI_stability = 0.10
AI_recovery = 0.18         # absorbed AI_error_handling's 0.08 (see DROPPED_AXIS_KEYS comment in aistupidlevel.rs)
AI_hallucination_resistance = 0.17
AI_edge_cases = 0.13

# Group weights only reference metrics we actually source. Earlier revisions
# carried NoveltyBench, EQWritingOrLongform, LiveBenchGeneral, NaturalPlan,
# PlanBench, TravelPlanner, JudgeBench, CodeJudgeBench, RewardBench2,
# CriticBench, LLMAggreFact — none of those have a public-leaderboard source
# we ingest, so they were permanently missing for every model and quietly
# dragged each group toward the 50-baseline shrink target. Better to be
# narrower and honest than wide and fake.

[group_weights.CRE]
LMArenaCreativeOrOpenEnded = 0.65
LMArenaText = 0.35

[group_weights.GEN]
ArtificialAnalysisIntelligence = 0.42
LMArenaText = 0.25
GPQA_HLE_Reasoning = 0.18
ARC_AGI_2 = 0.15        # novel pattern induction — orthogonal to knowledge benchmarks

[group_weights.PLAN]
# PLAN composition reflects "structured multi-step decomposition" measured
# end-to-end. TerminalBench remains important, but it is now capped at 0.20
# because the public leaderboard measures agent scaffold + model + execution
# policy, not pure model planning. The freed weight moves into model-leaning
# reasoning/tool-use signals so PLAN is less dominated by any one agent harness.
TerminalBench = 0.20
Tau2Bench = 0.22
ArtificialAnalysisReasoning = 0.22
IFBench = 0.14
LongContextRecall = 0.10
MCPAtlas = 0.12

# BUILD rebalanced: AACoding capped 0.18 → 0.12 (it's a meta-aggregate that
# overlaps SWE-bench, LCB, Terminal — the prior weight double-counted that
# overlap). Freed weight redistributed across the SWE composite (which is
# the closest direct measure of real-world software work), GDPval (real-
# world economic-value tasks), and SciCode (which measures correctness on
# scientific code, an underweighted axis for research/data work).
[group_weights.BUILD]
# BUILD rebalanced toward "real engineering work" — SWE composite + tool
# orchestration. SWEComposite carries 0.45 (rolled forward through the
# 0.40→0.42→0.45 path: first absorbing the 0.02 freed when MCPAtlas was
# trimmed, then the 0.03 freed when LiveCodeBench was retired in favor of
# GSO at 0.02). Once SWERebench / SWEBenchPro / SWEBenchVerified /
# SWEBenchMultilingual all flow through one normalized signal, that signal
# IS the headline building measurement.
# MCPAtlas trimmed back from 0.12 → 0.10 (Codex review pushback: MCP
# coverage is too sparse to justify the larger weight; the missing-data
# shrinkage already handles per-vendor gaps without a coefficient bump).
# Sonar's four submetrics collapsed into a single SonarComposite weight of
# 0.10 — same total influence, but cleaner missing-data accounting (one
# upstream payload should mark one missing entry, not four) and the three
# density submetrics are highly correlated.
# LiveCodeBench retired 2026-04 — its public JSON had been frozen at mid-
# 2025 frontier (no GPT-5/5.x, no Opus 4.5+, no Gemini 3, etc.) for ~12
# months and was contributing zero signal to current top models. Replaced
# by GSO at 0.02: same livecodebench.github.io operators, but GSO is the
# active "Generalized Software Optimization" track with frontier coverage
# and a contamination-resistant `score_hack_control` field (which we
# ingest in preference to raw `score`, mirroring our portfolio's bias
# toward contamination-resistant SWE signals like SWERebench).
SWEComposite = 0.45
MCPAtlas = 0.10
TerminalBench = 0.09
GSO = 0.02
ArtificialAnalysisCoding = 0.05
SciCode = 0.05
GDPval = 0.05
SonarComposite = 0.10
LongContextRecall = 0.05
CopilotArenaOrLMArenaCode = 0.04

# Composite metrics — per-model weighted average of normalized input metrics.
# Treated as a single derived metric in scoring so several SWE-flavor sources
# don't pile up as independent weights.
#
# SWEComposite now favors SWE-Bench Pro and lets a model with direct
# Verified+Pro coverage clear the shrink transition. Verified remains
# useful for breadth, but Pro is the stronger live frontier signal because
# Verified is increasingly saturated/contaminated at the top end.
[synthesis]
# Default 0.50 is too tight for gemini-2.5-pro, which needs the full
# aistupidlevel source (~17 metrics) from its 3-pro sibling. Raising to
# 0.55 keeps the safeguard while allowing large but justified gap-fills.
per_model_cap = 0.55
# Default 0.30 triggers warnings when many models share the same donor
# source (e.g., aistupidlevel, mcp_atlas). Raising to 0.45 eliminates
# the noise while still capping runaway synthesis.
per_source_cap = 0.45

[composite_metrics.SWEComposite]
# Rebalanced: Rebench↑0.10 (contamination-resistant rolling signal deserves more
# weight), Pro↓0.05 (still dominant, but Pro's sparse coverage already creates
# shrink-to-50 pressure via missing-data handling — stacking extra weight on top
# double-penalised models without Pro rows), Verified↓0.05 (saturated/contaminated
# at the frontier).
SWERebench = 0.40            # contamination-resistant rolling-window signal
SWEBenchVerified = 0.15      # widely reported, but saturated/contaminated
SWEBenchPro = 0.35           # hardest, multi-file (1.8k tasks, 4.1 files avg)
SWEBenchMultilingual = 0.10  # static, narrow scope, harder to game

# SonarComposite collapses Sonar's four submetrics (functional pass rate +
# three correlated density metrics) into one signal so that BUILD treats
# the whole Sonar payload as one source. Weights are kept proportional to
# the previous standalone weights (functional 0.04 / issue 0.025 / bug 0.02
# / vuln 0.015) → 0.40 / 0.25 / 0.20 / 0.15 within the composite.
[composite_metrics.SonarComposite]
SonarFunctionalSkill = 0.40
SonarIssueDensity = 0.25
SonarBugDensity = 0.20
SonarVulnerabilityDensity = 0.15

# LM_ARENA_REVIEW_PROXY is intentionally named as a proxy, not a judge
# benchmark. It coalesces LM Arena search/document preference ratings. That
# is useful review-adjacent evidence, but not direct code-review capability,
# so the R-axis weights it lightly.
[group_weights.LM_ARENA_REVIEW_PROXY]
LMArenaSearchDocument = 1.00

[group_weights.OPS_long]
OutputSpeed = 0.55
TTFT = 0.20
BlendedCost = 0.10
ContextWindow = 0.15

[group_weights.OPS_precision]
OutputSpeed = 0.30
TTFT = 0.35
BlendedCost = 0.20
ContextWindow = 0.15

[group_weights.OPS_review]
# Reviewing big PRs is the most context-hungry of the four roles, yet
# OPS_review previously weighted ContextWindow lower than OPS_long does.
# TTFT was also overweighted at 0.40 — reviewers care more that the full
# judgment lands than that the first token does. Rebalanced 2026-04 after
# multi-agent review: OutputSpeed up, TTFT down, ContextWindow up.
OutputSpeed = 0.30
TTFT = 0.25
BlendedCost = 0.20
ContextWindow = 0.25

# Role weights — capability scores. AISL perspective groups (A_I/A_P/A_B/A_R)
# carry weight 0.15: AISL is one source family with correlated noise re-
# projected onto four role-shaped views, so it gets a deliberately modest
# slot rather than dominating any role. Role-specific public-leaderboard
# groups carry 0.77 between them. The 0.15 weight keeps AISL meaningfully
# above the OPS floor (0.08) — the unique signals it carries
# (hallucination resistance, plan coherence, canary health) aren't
# measured by any other source — without letting one correlated source
# family overshadow direct public-benchmark evidence.
#
# Operational metrics (speed/cost/context/TTFT) carry weight 0.08, up from
# the earlier 0.03. The tail-penalty curve in OPS_* (top 80 % of the
# population maps to 70..100, bottom 20 % to 0..70) means models in the
# "fast enough" tier still cluster within a 2-point spread of each other
# in the role score — the small-penalty regime the previous 0.03 weight
# was trying to express. Models in the *bottom* 20 % drop sharply: at
# weight 0.08 a model on the slowest tail loses ~5 points relative to
# the fast cluster, which finally makes "utterly slow" actually hurt
# without warping rankings between models that are merely "average fast"
# vs "very fast." Use the OPS_* groups directly for a pure speed/cost
# view of the population.
[final_score_weights.I_raw]
CRE = 0.52
GEN = 0.25
A_I = 0.15
OPS_long = 0.08

[final_score_weights.P_raw]
# A_P remains a meaningful behavioral signal, but PLAN/GEN now carry enough
# weight that direct public benchmark evidence can override AISL outliers
# or synthesized AISL gaps.
PLAN = 0.46
GEN = 0.31
A_P = 0.15
OPS_precision = 0.08

[final_score_weights.B_raw]
BUILD = 0.70
PLAN = 0.07
A_B = 0.15
OPS_precision = 0.08

# R-axis: A_R remains a meaningful review-specific signal, while the renamed
# LM Arena proxy is deliberately lighter than the old JUDGE slot. BUILD/PLAN
# absorb most of the freed weight so reviewing stays anchored in code-reading
# capability and task decomposition rather than a search/document
# preference proxy.
[final_score_weights.R]
LM_ARENA_REVIEW_PROXY = 0.15
BUILD = 0.30
PLAN = 0.32
A_R = 0.15
OPS_review = 0.08

[reviewer_reservation]
I_adj = 0.08
P_adj = 0.18
B_adj = 0.32

[aggregation]
# Coverage threshold around which we transition from shrink-to-50 to
# trusting the present-weight mean directly.
trust_threshold = 0.70
# The width of the smooth-step transition band (centered on trust_threshold).
# 0.20 means the transition occurs over [0.60, 0.80].
trust_transition_width = 0.20

[penalties]
# Conservative discount applied to per-metric values that came in via
# sibling synthesis rather than a direct measurement. Pulls the score
# toward 50 by this fraction.
synthesis = 0.15
# Manual overrides are public but hand-curated. Making them slightly
# softer than a directly ingested leaderboard row (10% pull toward 50).
override_reported = 0.10
# Canary health deadband: health above this threshold attracts no penalty;
# below it the penalty ramps linearly to `canary_max_role_penalty` at
# `canary_health_floor`.
canary_health_deadband = 60.0
canary_health_floor = 20.0
canary_max_role_penalty = 6.0

[metrics.LMArenaText]
higher_better = true
log_scale = false
groups = ["CRE", "GEN"]
transform = "percentile"

[metrics.LMArenaCreativeOrOpenEnded]
higher_better = true
log_scale = false
groups = ["CRE"]
transform = "percentile"

[metrics.CopilotArenaOrLMArenaCode]
higher_better = true
log_scale = false
groups = ["BUILD"]
transform = "percentile"

[metrics.LMArenaSearchDocument]
higher_better = true
log_scale = false
groups = ["LM_ARENA_REVIEW_PROXY"]
transform = "percentile"

# All benchmark metrics use percentile normalization so they're on a
# common scale before being averaged. Raw scores reflect each benchmark's
# difficulty calibration (e.g. SWE-bench Verified saturates near 90% while
# Rebench caps out around 65%), so a passthrough scoring would systematically
# discount harder benchmarks. After percentile normalization, "top of
# leaderboard X" maps to ~100 across all benchmarks, regardless of headline
# difficulty.
[metrics.ArtificialAnalysisIntelligence]
higher_better = true
log_scale = false
groups = ["GEN"]
transform = "percentile"

[metrics.ArtificialAnalysisCoding]
higher_better = true
log_scale = false
groups = ["BUILD"]
transform = "percentile"

[metrics.ArtificialAnalysisReasoning]
higher_better = true
log_scale = false
groups = ["PLAN"]
transform = "percentile"

[metrics.LiveCodeBench]
# Retained as an ingested metric for backwards-compat with the cached
# fixture and any consumers reading per-source values, but removed from
# group_weights.BUILD (see comment there). The upstream JSON has been
# frozen at mid-2025 frontier for ~12 months; GSO is the active
# replacement track. `groups = []` keeps it descriptively unscored.
higher_better = true
log_scale = false
groups = []
transform = "percentile"

# GSO ("Generalized Software Optimization") replaces LiveCodeBench in the
# BUILD portfolio. We ingest the `score_hack_control` field — GSO's
# contamination-resistant variant, added specifically to penalize
# deceptive optimizations — rather than raw `score`. Filtered to the
# `Opt@1` setting; among Opt@1 rows for the same model we keep the one
# with the lowest reasoning_effort (per CLAUDE.md/memory variant policy).
[metrics.GSO]
higher_better = true
log_scale = false
groups = ["BUILD"]
transform = "percentile"

[metrics.GPQA_HLE_Reasoning]
higher_better = true
log_scale = false
groups = ["GEN"]
transform = "percentile"

# SWE-flavor metrics use percentile normalization so they enter the
# SWEComposite on a comparable scale. Raw scores reflect benchmark difficulty
# (Rebench tasks are harder than Verified by ~25% systematically), so
# arithmetically combining raw percentages would unfairly discount models
# with Rebench coverage. After percentile normalization, "top of Rebench"
# and "top of Verified" both map to ~100 within their own populations.
[metrics.SWEBenchVerified]
higher_better = true
log_scale = false
groups = ["BUILD"]
transform = "percentile"

[metrics.TerminalBench]
higher_better = true
log_scale = false
groups = ["PLAN", "BUILD"]
transform = "percentile"

[metrics.SWEBenchMultilingual]
higher_better = true
log_scale = false
groups = ["BUILD"]
transform = "percentile"

[metrics.SWERebench]
higher_better = true
log_scale = false
groups = ["BUILD"]
transform = "percentile"

# Scale's harder, multi-file SWE-Bench. Frontier scores 50-65% (vs Verified
# saturating near 90), so it differentiates better at the top.
[metrics.SWEBenchPro]
higher_better = true
log_scale = false
groups = ["BUILD"]
transform = "percentile"

# MCP-Atlas — Scale's tool-orchestration leaderboard over 36 real MCP servers.
# Feeds PLAN (planning multi-step tool sequences) and BUILD (real coding-agent
# loops are tool-orchestration loops).
[metrics.MCPAtlas]
higher_better = true
log_scale = false
groups = ["PLAN", "BUILD"]
transform = "percentile"

# ARC-AGI v2 (semi-private track) — pure novel-pattern induction.
# Orthogonal to GPQA/HLE which test learned knowledge.
[metrics.ARC_AGI_2]
higher_better = true
log_scale = false
groups = ["GEN"]
transform = "percentile"

# AA already publishes per-eval scores in its existing payload; these were
# previously unused. Wiring them up gives PLAN and BUILD more breadth without
# adding any new HTTP fetches.
[metrics.Tau2Bench]
higher_better = true
log_scale = false
groups = ["PLAN"]
transform = "percentile"

[metrics.SciCode]
higher_better = true
log_scale = false
groups = ["BUILD"]
transform = "percentile"

[metrics.IFBench]
higher_better = true
log_scale = false
groups = ["PLAN"]
transform = "percentile"

[metrics.LongContextRecall]
higher_better = true
log_scale = false
groups = ["PLAN", "BUILD"]
transform = "percentile"

# Sonar Code Quality leaderboard — functional pass rate.
[metrics.SonarFunctionalSkill]
higher_better = true
log_scale = false
groups = ["BUILD"]
transform = "percentile"

# Sonar issue density (issues / kLOC). Lower is better; the metric def
# inverts via `higher_better = false` before percentile normalization.
[metrics.SonarIssueDensity]
higher_better = false
log_scale = false
groups = ["BUILD"]
transform = "percentile"

# Sonar bug density (bugs / kLOC). Lower is better.
[metrics.SonarBugDensity]
higher_better = false
log_scale = false
groups = ["BUILD"]
transform = "percentile"

# Sonar vulnerability density (vulnerabilities / kLOC). Lower is better.
[metrics.SonarVulnerabilityDensity]
higher_better = false
log_scale = false
groups = ["BUILD"]
transform = "percentile"

# GDPval-AA measures real-world economic-value workflows across 44 knowledge-
# work occupations via blind pairwise comparison (Elo). Currently sourced
# only via overrides because AA's GDPval endpoint isn't exposed through the
# LLM-list API we already fetch.
[metrics.GDPval]
higher_better = true
log_scale = false
groups = ["BUILD"]
transform = "percentile"

# Operational metrics use the `tail_penalty` transform: the top 80 % of
# the population maps into 70-100 (most models look "fast/cheap enough"
# at a glance), only the bottom 20 % drops sharply. Linear/percentile
# normalization made every spread between models matter equally, which
# over-rewarded the very fastest models and over-punished moderately slow
# ones. Users perceive operational speed/cost in tiers, not linearly.
[metrics.OutputSpeed]
higher_better = true
log_scale = true
groups = ["OPS_long", "OPS_precision", "OPS_review"]
transform = "tail_penalty"

[metrics.TTFT]
higher_better = false
log_scale = true
groups = ["OPS_long", "OPS_precision", "OPS_review"]
transform = "tail_penalty"

[metrics.BlendedCost]
higher_better = false
log_scale = true
groups = ["OPS_long", "OPS_precision", "OPS_review"]
transform = "tail_penalty"

[metrics.ContextWindow]
higher_better = true
log_scale = true
groups = ["OPS_long", "OPS_precision", "OPS_review"]
transform = "tail_penalty"

[metrics.AI_correctness]
higher_better = true
log_scale = false
groups = ["A_I", "A_P", "A_B", "A_R"]
transform = "percentile"

[metrics.AI_spec]
higher_better = true
log_scale = false
groups = ["A_I", "A_P", "A_B", "A_R"]
transform = "percentile"

[metrics.AI_code]
