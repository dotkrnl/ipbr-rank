# Models added 2026-05-07 — refresh of the AA fixture (56 → 513 rows)
# surfaced direct AA coverage for MiniMax, Xiaomi, and Alibaba lines that
# were previously absent. GLM-5 base and Kimi K2.5 also moved from
# alias-collision / commented-reservation status to first-class entries.
# ------------------------------------------------------------------

# GLM-5 (base) — distinct from GLM-5.1. AA carries both as separate slugs
# (`glm-5` / `glm-5-1`); previously the `"glm-5"` shorthand was absorbed
# into glm-5.1's alias list, silently merging the two models. Direct
# coverage: AA, swebench (Verified+Multilingual), swerebench, arc_agi,
# sonar (id `glm-5`), terminal_bench, lmarena, openrouter. Override fills
# the MCP-Atlas gap (Z.ai HF card reports 67.8 on Public Set; Scale Labs
# only carries glm-5p1 = GLM-5.1 today).
[models."z-ai/glm-5"]
vendor = "zai"
aliases = [
    "glm-5", "glm 5",
    "glm-5-non-reasoning", "glm-5-thinking",
    "z.ai glm 5", "z-ai/glm-5", "zai/glm-5",
    # AA dated snapshot
    "glm-5-20260211",
]

# Kimi K2.5 — Moonshot's predecessor to K2.6. AA carries both Reasoning
# and Non-reasoning variants (`kimi-k2-5` / `kimi-k2-5-non-reasoning`).
# Scale Labs uses the no-decimal form `kimi-k2p5`, which the K2.6 entry
# above explicitly excludes. lmarena tracks `-instant` and `-thinking`
# endpoint variants; both alias to the same canonical id since per the
# variant-coverage policy we only score medium/thinking/adaptive.
[models."moonshotai/kimi-k2.5"]
vendor = "moonshot"
aliases = [
    "kimi 2.5", "kimi k2.5",
    "kimi-k2.5", "kimi-k2-5",
    "kimi-k2-5-non-reasoning", "kimi-k2-5-thinking",
    "kimi-k2.5-instant", "kimi-k2.5-thinking",
    "moonshot/kimi-k2.5", "moonshotai/kimi-k2.5",
    # Scale leaderboards spell decimals as `p`.
    "kimi-k2p5",
]

