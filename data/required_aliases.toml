# Required model aliases, ported verbatim from the Python reference's REQUIRED_ALIASES.
# Each entry seeds a ModelRecord before source ingestion begins.
#
# Aliases are deliberately verbose: upstream sources express the same model
# with different word orders ("claude-sonnet-4.5" vs "claude-4-5-sonnet"),
# different decimal separators ("4.5" vs "4-5"), AA's reasoning/effort
# suffixes, and common shorthand ("opus 4.7"). Add every observed form so
# the alias matcher hits exact lookup instead of falling back to fuzzy.

[models."openai/gpt-5.5"]
vendor = "openai"
aliases = [
    "gpt-5.5", "gpt 5.5", "gpt-5-5", "openai:gpt-5.5", "openai/gpt-5.5",
    # AA reasoning/effort variants — slug forms
    "gpt-5-5-high", "gpt-5-5-medium", "gpt-5-5-low", "gpt-5-5-non-reasoning",
]

