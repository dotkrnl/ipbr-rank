# DeepSeek V4-Flash. The upstream DeepSeek API exposes both `deepseek-chat`
# (non-thinking) and `deepseek-reasoner` (thinking on) endpoints, both of
# which currently route to V4-Flash on AISL. The two endpoints get scored
# independently by AISL — `deepseek-reasoner` measures noticeably worse
# than `deepseek-chat` on hourly axes (correctness 0.85 vs 0.99,
# edgeCases 0.83 vs 0.98). We alias only `deepseek-chat` so V4-Flash
# (and V4-Pro, which sibling-synthesizes from V4-Flash on AISL) reflects
# the non-thinking endpoint's measurements consistently. The reasoner
# row is left unmatched on purpose — it's a separate effort tier outside
# the medium/thinking/adaptive policy.
[models."deepseek/deepseek-v4-flash"]
vendor = "deepseek"
aliases = [
    "deepseek-chat", "deepseek chat", "deepseek/deepseek-chat",
    "deepseek-v4-flash", "deepseek v4 flash", "deepseek/deepseek-v4-flash",
]

