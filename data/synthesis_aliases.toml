# Sibling-synthesis table. Each entry says: when source S has no row for
# canonical_id `target`, copy source S's row for canonical_id `from` and
# emit it as a synthesized RawRow tagged `synthesized_from = "<from>"`.
#
# The active pairs below were curated from the Phase 1 source set that now
# emits these donor models upstream; the commented placeholders stay out of
# the binding list until a real sibling exists in required_aliases data.

# gpt-5.5→gpt-5.4 is declared AFTER gpt-5.4→gpt-5.3-codex so that when gpt-5.5
# looks for a gpt-5.4 row in the swerebench source it finds the already-synthesized
# row (gpt-5.4 ← gpt-5.3-codex), allowing one-hop chaining for SWERebench coverage.
# Pair ordering matters: donors must be emitted before the pairs that depend on them.

[[pair]]
target = "google/gemini-3.1-pro-preview"
from = "google/gemini-3-pro"

# gemini-3-flash previously synthesized from gemini-2.5-flash, which is
# two generations removed and chronically weak on AISL — that pulled
# 3-flash's perspective scores down sharply for no good reason. Use
# gemini-3-pro as the donor instead: same generation, different size
# tier, but a far closer capability profile than the 2.5 sibling.
[[pair]]
target = "google/gemini-3-flash"
from = "google/gemini-3-pro"

[[pair]]
target = "openai/gpt-5.3-codex"
from = "openai/gpt-5.4"

# Sonnet 4 was released May 2025 and never benchmarked by Anthropic on
# Terminal-bench (only Opus 4 was) or by tbench.ai upstream, so it lacks
# direct coverage on several agentic-coding leaderboards. Use Sonnet 4.5
# as the donor — it's the closest forward-sibling and rates a generation
# higher, so the synthesis is mildly optimistic; treat results accordingly.
[[pair]]
target = "anthropic/claude-sonnet-4"
from = "anthropic/claude-sonnet-4.5"

# GLM-5.1 ↔ Kimi K2.6 cross-vendor synthesis. Practitioner consensus
# (and our own SWE-rebench / AA Coding numbers where both have direct
# data) is that these two open-weight models trade blows in the same
# capability tier — typical gap is 1-3 points on most coding evals.
# When one is missing from a leaderboard the other is a defensible
# stand-in. The pair is symmetrical so each can borrow from the other
# for coverage gaps (AISL covers Kimi but not GLM; some leaderboards
# cover GLM but not Kimi).
[[pair]]
target = "z-ai/glm-5.1"
from = "moonshotai/kimi-k2.6"

[[pair]]
target = "moonshotai/kimi-k2.6"
from = "z-ai/glm-5.1"

# Opus 4.7 is the direct successor to Opus 4.6. 4.6 has 100% source coverage
# and can conservatively backfill 4.7's missing arc_agi and swerebench rows.
[[pair]]
target = "anthropic/claude-opus-4.7"
from = "anthropic/claude-opus-4.6"

# Gemini 2.5-flash lacks mcp_atlas, overrides, sonar, and swebench_pro.
# The 2.5-pro sibling lacks the same sources, so the next-generation
# 3-flash (same tier, full coverage) is the closest defensible donor.
[[pair]]
target = "google/gemini-2.5-flash"
from = "google/gemini-3-flash"

# Gemini 2.5-pro has no AISL coverage at all, which collapses all four
# A_* perspective groups to the 50 baseline. The 3-pro donor is same-tier
# and adjacent-generation; it fills the AISL gap plus mcp_atlas, overrides,
# sonar, and swebench_pro. This pushes synthesis ratio to ~51%, so the
# per_model_cap in coefficients.toml is raised slightly to accommodate it.
[[pair]]
target = "google/gemini-2.5-pro"
from = "google/gemini-3-pro"

# ------------------------------------------------------------------
# Synthesis for newly-added AISL models (2026-04-27)
# ------------------------------------------------------------------

# Claude Sonnet 4.6 is the current-generation Sonnet; 4.5 is its direct
# predecessor with 100% source coverage. Same-tier, prior-gen synthesis
# is conservative and safe.
[[pair]]
target = "anthropic/claude-sonnet-4.6"
from = "anthropic/claude-sonnet-4.5"

# Claude Opus 4.5 is a legacy model (superseded by 4.6/4.7). Opus 4.6 has
# full coverage. Mildly optimistic since 4.6 > 4.5, but same tier.
[[pair]]
target = "anthropic/claude-opus-4.5"
from = "anthropic/claude-opus-4.6"

# GPT-5.2 is the entry-level model in the GPT-5 family. GPT-5.4 is the
# closest forward sibling with broad source coverage. Optimistic but
# defensible within the same product family.
[[pair]]
target = "openai/gpt-5.2"
from = "openai/gpt-5.4"

# GLM-4.6 and GLM-4.7 are adjacent generations from Z.ai. 4.7 should be
# at least as capable as 4.6, making this mildly optimistic.
[[pair]]
target = "z-ai/glm-4.6"
from = "z-ai/glm-4.7"

# GPT-5.4 is only missing swerebench (swebench is already covered by
# overrides). The coding-specialist GPT-5.3-codex has swerebench data;
# using it for this single benchmark is defensible since SWERebench is
# explicitly a coding evaluation.
# This pair is declared BEFORE gpt-5.5→gpt-5.4 so the chained swerebench
# row is available when gpt-5.5 synthesizes from gpt-5.4.
[[pair]]
target = "openai/gpt-5.4"
from = "openai/gpt-5.3-codex"

[[pair]]
target = "openai/gpt-5.5"
from = "openai/gpt-5.4"

# Grok-code-fast-1 lacks arc_agi; grok-4-latest has it. Same vendor, small
# single-metric gap-fill.
[[pair]]
target = "xai/grok-code-fast-1"
from = "xai/grok-4-latest"

# Opus 4.1 (Aug 2025) is the oldest Opus we track and predates Anthropic's
# adoption of SWE-bench Multilingual / SWE-Bench Pro / GDPval-AA in their
# system cards. Opus 4.5 is the closest forward-sibling with full coverage.
# Synthesis is mildly optimistic since 4.5 > 4.1 in capability, but better
# than leaving 4.1 anchored at the 50-baseline on three of five SWE/agentic
# metrics — currently 4.1 ranks below Sonnet 4, which contradicts release
# ordering.
[[pair]]
target = "anthropic/claude-opus-4.1"
from = "anthropic/claude-opus-4.5"

# Kimi K2-0905 (Sept 2025) lacks SWE-Bench Pro; Moonshot only began reporting
# Pro with K2.6. Use K2.6 as the donor for that single-metric gap. Mildly
# optimistic but defensible within the same family.
[[pair]]
target = "moonshotai/kimi-k2-0905"
from = "moonshotai/kimi-k2.6"

# DeepSeek V4-Flash (released 2026-04-24) is missing SWERebench, the
# heaviest weight in SWEComposite (0.40). SWE-Rebench is a rolling-window
# benchmark that updates monthly and simply hasn't reached V4-Flash yet —
# this is a transient timing gap, not vendor non-publication. Cross-vendor
# tier-proxy from Kimi K2.6: same open-weight tier, similar parameter scale
# (V4-Flash 284B/13B-active vs K2.6 mid-size MoE), and editorial consensus
# puts them in the same capability band. The per-field filter in
# `ingest_synthesized_row` ensures Kimi only writes to fields V4-Flash
# is missing — V4-Flash's real `deepseek-chat` AISL data is preserved
# untouched, and Kimi only fills SWERebench (and any other Flash-missing
# fields where Kimi has data). Remove this pair once V4-Flash appears on
# swerebench.com directly.
[[pair]]
target = "deepseek/deepseek-v4-flash"
from = "moonshotai/kimi-k2.6"

# DeepSeek V4-Pro (1.6T/49B-active, released 2026-04-24) borrows from its
# same-generation sibling V4-Flash for AISL — AISL only tracks DeepSeek
# under the `deepseek-chat` API endpoint (aliased to V4-Flash), so V4-Pro
# has no direct AISL row of its own. Same vendor, same generation, same
# training pipeline; only parameter scale differs. Pro > Flash on
# capability so the AISL synthesis is mildly *conservative* — V4-Pro's
# borrowed scores understate real strength rather than overstate.
#
# Pair ordering: this pair is declared *after* V4-Flash ← Kimi K2.6 above
# so V4-Pro's donor pool from V4-Flash includes both the real
# `deepseek-chat` row and the Kimi-derived synth row that fills V4-Flash's
# SWERebench. At V4-Pro's `ingest_synthesized_row`, first-write-wins
# means the chat-derived clone wins on AISL fields (it was pushed before
# the Kimi pair ran), while the Kimi-derived clone fills SWERebench (no
# competing chat row). Net effect: V4-Pro's AISL = deepseek-chat data
# (consistent with V4-Flash); V4-Pro's SWERebench = Kimi-tier proxy.
[[pair]]
target = "deepseek/deepseek-v4-pro"
from = "deepseek/deepseek-v4-flash"

# ------------------------------------------------------------------
# Synthesis for newly-added models (2026-05-07, post AA fixture refresh)
# ------------------------------------------------------------------

# Kimi K2.5 ← Kimi K2.6. Same vendor, direct successor. K2.5 has no
# AISL row (Moonshot's API endpoints moved to K2.6), so all four A_*
# perspective groups default to the 50 baseline without this pair. K2.6
# tracks `kimi-latest` / `kimi-k2-turbo-preview` on AISL, which fills
# K2.5's AISL gap. Per Moonshot's own K2.6 launch numbers K2.6 ≥ K2.5
# (SWE-Verified 80.2 vs 76.8, SWE-Pro 58.6 vs 50.7), so the synthesis is
# mildly optimistic; the 15% synthesis penalty + 30% per-source cap keep
# the bias bounded. Pair declared first so chained downstream pairs
# (mimo-v2.5-pro ← K2.5 and minimax-m2.5 ← K2.5) see the AISL-filled
# K2.5 row.
[[pair]]
target = "moonshotai/kimi-k2.5"
from = "moonshotai/kimi-k2.6"

# MiMo-V2.5 ← MiMo-V2.5-Pro. Same Xiaomi family, larger sibling. The
# smaller V2.5 only self-reports SWE-Pro (56.1) and Terminal-Bench (65.8)
# while V2.5-Pro carries SWE-Verified, SWE-Pro, Terminal-Bench plus full
# AA. Per Xiaomi: V2.5 targets "Pro-level performance at half the
# inference cost", so larger-sibling synthesis is mildly optimistic but
# stays within the same training pipeline. Pair must be declared *after*
# V2.5-Pro's own synthesis pair so V2.5's donor pool sees the
# Kimi-derived rows that fill V2.5-Pro's missing fields.
[[pair]]
target = "xiaomi/mimo-v2.5-pro"
from = "moonshotai/kimi-k2.5"

[[pair]]
target = "xiaomi/mimo-v2.5"
from = "xiaomi/mimo-v2.5-pro"

# MiniMax M2.5 ← Kimi K2.5. Cross-vendor tier proxy. M2.5 is an orphan
# target — first MiniMax model in the rank, no same-vendor sibling, and
# AA tracks no Tencent/MiniMax models on AISL. Kimi K2.5 was selected
# over GLM-5 because K2.5 carries direct mcp_atlas data (`kimi-k2p5` on
# Scale Labs) which fills M2.5's biggest single capability gap; the
# already-declared K2.5 ← K2.6 pair above also bubbles AISL through the
# chain. AA Coding scores cluster closely (m2.5 37.4 vs k2.5 39.5) so
# the tier proxy is defensible. Pair must follow K2.5's own pair so the
# K2.6-derived AISL rows are visible.
[[pair]]
target = "minimax/minimax-m2.5"
from = "moonshotai/kimi-k2.5"

# MiniMax M2.7 ← MiniMax M2.5. Same vendor, prior generation. M2.5 has
# full SWE-Verified + SWE-Rebench + arc_agi + terminal_bench + AA
# coverage; M2.7's vendor reports omit SWE-Verified entirely (a notable
# gap — they emphasized SWE-Pro / Multilingual / TB instead). Synthesis
# from M2.5 is conservative since M2.7 ≥ M2.5 in capability per launch
# numbers (SWE-Pro 56.22 vs 55.4). Pair must follow M2.5's pair so M2.7
# inherits the K2.5-derived AISL/MCP-Atlas fills indirectly.
[[pair]]
target = "minimax/minimax-m2.7"
from = "minimax/minimax-m2.5"

# GLM-5 ← GLM-5.1. Same vendor, direct successor. Z.ai didn't publish
# SWE-Bench Pro for the base GLM-5 (only for 5.1, where it claims SOTA
# 58.4). 5.1 is a meaningful capability step over 5, so the synthesis is
# mildly optimistic — but the gap is small (one metric, primarily) and
# 5.1's number is well-cited. Pair declared before the qwen3.6-plus pair
# below so qwen3.6-plus's GLM-5 donor pool sees the SWE-Pro fill.
[[pair]]
target = "z-ai/glm-5"
from = "z-ai/glm-5.1"

# Qwen3.6-Plus ← GLM-5. Cross-vendor tier proxy. Qwen3.6-Plus has no
# Alibaba sibling in our rank; AA's other Qwen entries are open-weight
# size variants (3.5-397B-A17B, 3-235B-A22B, etc.) that don't carry
# sonar/swerebench/arc_agi either. GLM-5 was selected over Kimi K2.5
# because GLM-5 carries Sonar (the only public benchmark scoring code
# quality directly) and a direct arc_agi v2_Semi_Private row, both of
# which Qwen3.6-Plus's blog cannot fill. AA Coding scores cluster
# closely (qwen3.6-plus 42.9 vs glm-5 44.2), so the tier proxy is
# defensible. Mildly conservative: GLM-5 underperforms qwen3.6-plus on
# AA Reasoning blend (gpqa+hle), so the synthesized arc_agi will read
# slightly low.
[[pair]]
target = "qwen/qwen3.6-plus"
from = "z-ai/glm-5"
