# Sibling-synthesis table. Each entry says: when source S has no row for
# canonical_id `target`, copy source S's row for canonical_id `from` and
# emit it as a synthesized RawRow tagged `synthesized_from = "<from>"`.
#
# The active pairs below were curated from the Phase 1 source set that now
# emits these donor models upstream; the commented placeholders stay out of
# the binding list until a real sibling exists in required_aliases data.

[[pair]]
target = "openai/gpt-5.5"
from = "openai/gpt-5.4"

[[pair]]
target = "google/gemini-3.1-pro-preview"
from = "google/gemini-3-pro"

# gemini-3-flash previously synthesized from gemini-2.5-flash, which is
# two generations removed and chronically weak on AISL — that pulled
# 3-flash's perspective scores down sharply for no good reason. Use
# gemini-3-pro as the donor instead: same generation, different size
# tier, but a far closer capability profile than the 2.5 sibling.
[[pair]]
target = "google/gemini-3-flash"
from = "google/gemini-3-pro"

[[pair]]
target = "openai/gpt-5.3-codex"
from = "openai/gpt-5.4"

# Sonnet 4 was released May 2025 and never benchmarked by Anthropic on
# Terminal-bench (only Opus 4 was) or by tbench.ai upstream, so it lacks
# direct coverage on several agentic-coding leaderboards. Use Sonnet 4.5
# as the donor — it's the closest forward-sibling and rates a generation
# higher, so the synthesis is mildly optimistic; treat results accordingly.
[[pair]]
target = "anthropic/claude-sonnet-4"
from = "anthropic/claude-sonnet-4.5"

# GLM-5.1 ↔ Kimi K2.6 cross-vendor synthesis. Practitioner consensus
# (and our own SWE-rebench / AA Coding numbers where both have direct
# data) is that these two open-weight models trade blows in the same
# capability tier — typical gap is 1-3 points on most coding evals.
# When one is missing from a leaderboard the other is a defensible
# stand-in. The pair is symmetrical so each can borrow from the other
# for coverage gaps (AISL covers Kimi but not GLM; some leaderboards
# cover GLM but not Kimi).
[[pair]]
target = "z-ai/glm-5.1"
from = "moonshotai/kimi-k2.6"

[[pair]]
target = "moonshotai/kimi-k2.6"
from = "z-ai/glm-5.1"
